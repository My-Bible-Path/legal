<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Legal — My Bible Path</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #121218;
            color: #E8E0D5;
            font-family: Georgia, 'Times New Roman', serif;
            line-height: 1.8;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            max-width: 480px;
            width: 100%;
            padding: 48px 24px;
            text-align: center;
        }
        .header-icon {
            font-size: 48px;
            color: #C9A84C;
            margin-bottom: 16px;
        }
        h1 {
            font-family: Georgia, serif;
            font-size: 32px;
            font-weight: 400;
            color: #C9A84C;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }
        .subtitle {
            font-size: 14px;
            color: rgba(232, 224, 213, 0.5);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 48px;
        }
        .links {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .links a {
            display: block;
            padding: 20px 24px;
            background: rgba(201, 168, 76, 0.08);
            border: 1px solid rgba(201, 168, 76, 0.2);
            border-radius: 12px;
            color: #E8E0D5;
            text-decoration: none;
            font-size: 18px;
            transition: all 0.2s ease;
        }
        .links a:hover {
            background: rgba(201, 168, 76, 0.15);
            border-color: rgba(201, 168, 76, 0.4);
        }
        .links a span {
            display: block;
            font-size: 13px;
            color: rgba(232, 224, 213, 0.45);
            margin-top: 4px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        .footer {
            margin-top: 64px;
            font-size: 13px;
            color: rgba(232, 224, 213, 0.3);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-icon">&#10013;</div>
        <h1>My Bible Path</h1>
        <div class="subtitle">Legal</div>

        <div class="links">
            <a href="privacy.html">
                Privacy Policy
                <span>How we handle your data</span>
            </a>
            <a href="terms.html">
                Terms of Use
                <span>Rules for using the app</span>
            </a>
        </div>

        <div class="footer">
            &copy; 2026 My Bible Path. All rights reserved.
        </div>
    </div>
</body>
</html>
